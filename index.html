<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Auditorías 5S · FHACASA / ALIANSA (Nube)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --navy:#233247; --navy-dark:#1a2536; --navy-light:#2e4059;
    --teal:#2fb6a8; --teal-dark:#238f84;
    --green:#19b069; --red:#d94c4c; --amber:#e0a324;
    --bg:#f3f5f8; --card:#ffffff; --border:#e3e7ee;
    --text:#26303d; --text-dim:#6b7686;
    --radius:10px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:15px}
  #app{display:flex;min-height:100vh}
  #sidebar{width:230px;background:var(--navy);color:#cfd8e3;flex-shrink:0;position:fixed;top:0;bottom:0;left:0;z-index:30;transform:translateX(0);transition:transform .2s ease;overflow-y:auto;}
  #sidebar .brand{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1px solid var(--navy-light)}
  #sidebar .brand .logo{width:32px;height:32px;border-radius:8px;background:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:700;color:#0d3530}
  #sidebar .brand b{color:#fff;font-size:15px}
  #sidebar .brand span{display:block;font-size:11px;color:#8fa0b5}
  #sidebar nav{padding:10px 8px}
  #sidebar .navlabel{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#7c8ba0;padding:14px 10px 6px}
  #sidebar .navitem{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:#cfd8e3;text-decoration:none;font-size:14px;margin-bottom:2px}
  #sidebar .navitem:hover{background:var(--navy-light)}
  #sidebar .navitem.active{background:var(--teal);color:#06231f;font-weight:600}
  #sidebar .navitem .ic{width:18px;text-align:center}
  #sidebar .userbox{padding:12px 16px;border-top:1px solid var(--navy-light);font-size:12px;color:#9fb0c3}
  #sidebar .userbox b{color:#fff;display:block;font-size:13px}
  #sidebar .userbox button{margin-top:8px;background:none;border:1px solid var(--navy-light);color:#cfd8e3;border-radius:6px;padding:5px 10px;font-size:12px;width:100%}
  #main{margin-left:230px;flex:1;min-width:0}
  #topbar{background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:10px 18px;position:sticky;top:0;z-index:20;}
  #topbar h1{font-size:17px;margin:0;flex:1}
  #menuBtn{display:none;background:none;border:none;font-size:20px;color:var(--navy)}
  .plantaTag{font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;background:#eef2f7;color:var(--navy)}
  #content{padding:18px;max-width:980px;margin:0 auto}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
  .card h2{font-size:15px;margin:0 0 12px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .col{flex:1;min-width:150px}
  label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:4px;font-weight:600}
  input[type=text],input[type=date],input[type=email],input[type=password],select,textarea{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:7px;background:#fbfcfe}
  textarea{resize:vertical;min-height:60px}
  .btn{border:none;border-radius:7px;padding:10px 16px;font-size:14px;font-weight:600;color:#fff;background:var(--navy)}
  .btn.teal{background:var(--teal)} .btn.green{background:var(--green)} .btn.red{background:var(--red)}
  .btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--border)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.block{width:100%}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
  .kpi b{font-size:24px;display:block}
  .kpi span{font-size:12px;color:var(--text-dim)}
  .badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;display:inline-block}
  .badge.ok{background:#e4f7ee;color:var(--green)} .badge.no{background:#fbe9e9;color:var(--red)} .badge.na{background:#eef1f5;color:var(--text-dim)}
  .badge.abierta{background:#fdf0dc;color:var(--amber)} .badge.proceso{background:#e6f0fb;color:#2764c9}
  .badge.vencida{background:#fbe9e9;color:var(--red)} .badge.completada{background:#e4f7ee;color:var(--green)}
  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--border)}
  th{color:var(--text-dim);font-size:11px;text-transform:uppercase}
  .list-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px}
  .list-item:last-child{border-bottom:none}
  .qcard{border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
  .qcard .qtxt{font-size:14.5px;font-weight:600;margin-bottom:10px}
  .seg{display:flex;gap:6px}
  .seg button{flex:1;padding:9px;border-radius:7px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:600;color:var(--text-dim)}
  .seg button.sel-ok{background:var(--green);color:#fff;border-color:var(--green)}
  .seg button.sel-no{background:var(--red);color:#fff;border-color:var(--red)}
  .seg button.sel-na{background:var(--text-dim);color:#fff;border-color:var(--text-dim)}
  .photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .photo{position:relative;width:68px;height:68px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
  .photo img{width:100%;height:100%;object-fit:cover}
  .photo .rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:11px;line-height:1}
  .addphoto{width:68px;height:68px;border-radius:8px;border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-dim);font-size:22px;background:#fbfcfe}
  .banner{padding:10px 12px;border-radius:8px;font-size:13px;margin-bottom:12px}
  .banner.warn{background:#fdf0dc;color:#8a5a00} .banner.info{background:#e6f0fb;color:#2050a0} .banner.err{background:#fbe9e9;color:#a02020}
  .empty{text-align:center;color:var(--text-dim);padding:30px 10px;font-size:14px}
  .stepbar{display:flex;gap:4px;margin-bottom:14px}
  .stepbar i{flex:1;height:4px;border-radius:3px;background:#e3e7ee}
  .stepbar i.done{background:var(--teal)}
  .catpill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--navy);color:#fff;margin-bottom:8px}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .filters select,.filters input{width:auto;min-width:120px}
  #overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;z-index:25}
  #overlay.show{display:block}

const SUPABASE_URL = 'https://tlpcsuzwgzxrqmhwamli.supabase.co';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const msg = document.getElementById('loginMsg');
  msg.innerHTML='';
  const {data, error} = await sb.auth.signInWithPassword({email, password:pass});
  if(error){ msg.innerHTML = `<div class="banner err">${error.message}</div>`; return; }
  await onAuthed(data.user);
}
async function doSignup(){
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const msg = document.getElementById('loginMsg');
  msg.innerHTML='';
  if(!email || pass.length<6){ msg.innerHTML = `<div class="banner warn">Correo válido y contraseña de al menos 6 caracteres.</div>`; return; }
  const {data, error} = await sb.auth.signUp({email, password:pass});
  if(error){ msg.innerHTML = `<div class="banner err">${error.message}</div>`; return; }
  if(data.user && !data.session){
    msg.innerHTML = `<div class="banner info">Cuenta creada. Si tu proyecto pide confirmación por correo, revisa tu bandeja antes de iniciar sesión.</div>`;
  } else if(data.user){
    await onAuthed(data.user);
  }
}
async function doLogout(){ await sb.auth.signOut(); location.reload(); }
async function onAuthed(user){
  currentUser = user;
  let {data: perfil} = await sb.from('usuarios').select('*').eq('id', user.id).maybeSingle();
  if(!perfil){
    await sb.from('usuarios').insert({id:user.id, nombre:user.email, rol:'Auditor'});
    const r = await sb.from('usuarios').select('*').eq('id', user.id).maybeSingle();
    perfil = r.data;
  }
  currentPerfil = perfil;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('userEmail').textContent = user.email;
  document.getElementById('userRol').textContent = perfil?.rol || 'Auditor';
  renderNav();
  go('dashboard');
}
(async function initAuth(){
  const {data:{session}} = await sb.auth.getSession();
  if(session?.user) await onAuthed(session.user);
})();

/* ======================= UTIL ======================= */
function uid(){ return crypto.randomUUID(); }
function fmtDate(d){ if(!d) return '-'; const dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('es-CR',{year:'numeric',month:'2-digit',day:'2-digit'}); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function pct(n,d){ return d? Math.round((n/d)*100):0; }
function compressImage(file){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        const maxDim = 1000;
        let {width,height} = img;
        if(width>height && width>maxDim){ height = height*maxDim/width; width=maxDim; }
        else if(height>maxDim){ width = width*maxDim/height; height=maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width=width; canvas.height=height;
        canvas.getContext('2d').drawImage(img,0,0,width,height);
        canvas.toBlob(blob=>resolve(blob), 'image/jpeg', 0.6);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}
async function uploadPhoto(blob, path){
  const {error} = await sb.storage.from('evidencias').upload(path, blob, {contentType:'image/jpeg', upsert:true});
  if(error){ alert('Error subiendo foto: '+error.message); return null; }
  const {data} = sb.storage.from('evidencias').getPublicUrl(path);
  return data.publicUrl;
}
function getGPS(){
  return new Promise((resolve)=>{
    if(!navigator.geolocation){ resolve({error:'Geolocalización no soportada'}); return; }
    const timeout = setTimeout(()=>resolve({error:'Tiempo de espera agotado'}), 8000);
    navigator.geolocation.getCurrentPosition(
      pos=>{ clearTimeout(timeout); resolve({lat:pos.coords.latitude,lng:pos.coords.longitude,acc:pos.coords.accuracy}); },
      err=>{ clearTimeout(timeout); resolve({error: err.message}); },
      {enableHighAccuracy:true, timeout:7000}
    );
  });
}
function csvEscape(v){ if(v==null) return ''; const s=String(v).replace(/"/g,'""'); return /[",\n]/.test(s)?`"${s}"`:s; }
function download(filename, content, mime){
  const blob = new Blob([content],{type:mime});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
}
function estadoAccion(a){
  if(a.estado==='Completada') return 'Completada';
  if(a.fecha_compromiso && a.fecha_compromiso < todayISO()) return 'Vencida';
  return a.estado || 'Abierta';
}

function donutSVG(segments, size=170, thickness=30){
  const total = segments.reduce((s,x)=>s+x.value,0) || 1;
  const r = (size - thickness)/2, C = 2*Math.PI*r;
  let offset = 0;
  const circles = segments.map(seg=>{
    const len = (seg.value/total)*C;
    const el = `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${seg.color}" stroke-width="${thickness}" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-offset}"></circle>`;
    offset += len; return el;
  }).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">${circles}</svg>`;
}
function legendTable(segments){
  const total = segments.reduce((s,x)=>s+x.value,0);
  return `<table style="margin-top:6px"><tr><th></th><th style="text-align:right">Total</th><th style="text-align:right">%</th></tr>
    ${segments.map(s=>`<tr><td><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${s.color};margin-right:6px"></span>${s.label}</td>
      <td style="text-align:right">${s.value}</td><td style="text-align:right">${pct(s.value,total)}%</td></tr>`).join('')}</table>`;
}

function ncBlockHTML(qid, ex){
  return `<div style="margin-top:10px">
    <label>Hallazgo (obligatorio)</label>
    <input type="text" id="hz_${qid}" value="${ex.hallazgo||''}" oninput="updateField('${qid}','hallazgo',this.value)">
    <label style="margin-top:8px">Comentario / acción sugerida (obligatorio)</label>
    <textarea oninput="updateField('${qid}','comentario',this.value)">${ex.comentario||''}</textarea>
    <label style="margin-top:8px">Evidencia fotográfica (máx. 4, obligatoria)</label>
    <div class="photos" id="ph_${qid}">
      ${(ex.fotos||[]).map((src,i)=>`<div class="photo"><img src="${src}"><button class="rm" onclick="removePhoto('${qid}',${i})">✕</button></div>`).join('')}
      ${(ex.fotos||[]).length<4? `<label class="addphoto">＋<input type="file" accept="image/*" capture="environment" style="display:none" onchange="addPhoto('${qid}',this)"></label>`:''}
    </div></div>`;
}
function ensureNA(qid){
  if(!state.nuevaAuditoria.respuestas[qid]) state.nuevaAuditoria.respuestas[qid] = {valor:null,hallazgo:'',comentario:'',fotos:[],fotosBlobs:[]};
  return state.nuevaAuditoria.respuestas[qid];
}
function setValor(qid,val){
  const r = ensureNA(qid); r.valor = val;
  if(val!=='No Cumple'){ r.hallazgo=''; r.comentario=''; r.fotos=[]; r.fotosBlobs=[]; }
  renderNueva();
}
function updateField(qid,field,val){ ensureNA(qid)[field]=val; }
async function addPhoto(qid, input){
  const file = input.files[0]; if(!file) return;
  const blob = await compressImage(file);
  const r = ensureNA(qid); r.fotos = r.fotos||[]; r.fotosBlobs = r.fotosBlobs||[];
  if(r.fotos.length>=4) return;
  r.fotos.push(URL.createObjectURL(blob)); r.fotosBlobs.push(blob);
  renderNueva();
}
function removePhoto(qid, i){ const r=ensureNA(qid); r.fotos.splice(i,1); r.fotosBlobs.splice(i,1); renderNueva(); }
function prevQ(){ state.nuevaAuditoria.step = Math.max(0, state.nuevaAuditoria.step-1); renderNueva(); }
function nextQ(qid){
  const r = ensureNA(qid);
  if(!r.valor){ alert('Selecciona una opción antes de continuar.'); return; }
  if(r.valor==='No Cumple'){
    if(!r.hallazgo || !r.comentario){ alert('Hallazgo y comentario son obligatorios.'); return; }
    if(!r.fotos || r.fotos.length===0){ alert('Adjunta al menos 1 fotografía.'); return; }
  }
  state.nuevaAuditoria.step++; renderNueva();
}
function cancelAudit(){ if(confirm('¿Cancelar esta auditoría?')){ state.nuevaAuditoria=null; go('dashboard'); } }
function renderReview(preguntas){
  const na = state.nuevaAuditoria;
  const hallazgos = preguntas.filter(q=> (na.respuestas[q.id]||{}).valor==='No Cumple');
  document.getElementById('content').innerHTML = `
    <div class="card"><h2>Revisión final</h2>
      <p><b>Planta:</b> ${na.planta} &nbsp; <b>Área:</b> ${na.area} &nbsp; <b>Auditor:</b> ${na.auditor} &nbsp; <b>Fecha:</b> ${fmtDate(na.fecha)}</p>
      <p><b>Preguntas evaluadas:</b> ${preguntas.length} &nbsp; <b>Hallazgos:</b> ${hallazgos.length}</p>
      ${na.gps && na.gps.error? `<div class="banner warn">GPS no capturado: ${na.gps.error}</div>`:''}
      ${na.gps && na.gps.lat? `<div class="banner info">Ubicación: ${na.gps.lat.toFixed(5)}, ${na.gps.lng.toFixed(5)}</div>`:''}
      ${hallazgos.length? '<h2 style="margin-top:16px">Hallazgos encontrados</h2>' + hallazgos.map(q=>{
        const r = na.respuestas[q.id];
        return `<div class="qcard"><span class="catpill">${q.categoria}</span><div class="qtxt">${q.texto}</div>
          <p style="font-size:13px"><b>Hallazgo:</b> ${r.hallazgo}</p><p style="font-size:13px"><b>Comentario:</b> ${r.comentario}</p>
          <div class="photos">${r.fotos.map(f=>`<div class="photo"><img src="${f}"></div>`).join('')}</div></div>`;
      }).join('') : '<div class="banner info">Sin hallazgos — ¡excelente resultado!</div>'}
      <button class="btn green block" id="btnGuardar" style="margin-top:10px" onclick="finishAudit()">Guardar auditoría en la nube</button>
      <button class="btn ghost block" style="margin-top:8px" onclick="state.nuevaAuditoria.step=${preguntas.length-1};renderNueva()">← Volver a editar</button>
    </div>`;
}
async function startAudit(){
  const planta = document.getElementById('npPlanta').value;
  const area = document.getElementById('npArea').value;
  const auditor = document.getElementById('npAuditor').value.trim();
  const fecha = document.getElementById('npFecha').value;
  if(!planta||!area||!auditor||!fecha){ alert('Completa todos los campos.'); return; }
  localStorage.setItem('auditorNombre', auditor); state.auditorNombre = auditor;
  state.nuevaAuditoria = {planta,area,auditor,fecha,step:0,respuestas:{}, gps:null};
  renderNueva();
  const gps = await getGPS();
  if(state.nuevaAuditoria) state.nuevaAuditoria.gps = gps;
}
async function finishAudit(){
  const btn = document.getElementById('btnGuardar'); if(btn){ btn.disabled=true; btn.textContent='Guardando y subiendo fotos...'; }
  const na = state.nuevaAuditoria;
  const {data: auditoria, error: e1} = await sb.from('auditorias').insert({
    planta:na.planta, area:na.area, auditor:na.auditor, fecha:na.fecha,
    gps_lat:na.gps?.lat||null, gps_lng:na.gps?.lng||null
  }).select().single();
  if(e1){ alert('Error guardando auditoría: '+e1.message); if(btn) btn.disabled=false; return; }

  const preguntas = await getPreguntas();
  for(const q of preguntas){
    const r = na.respuestas[q.id] || {valor:'No Aplica',hallazgo:'',comentario:'',fotos:[],fotosBlobs:[]};
    let fotoUrls = [];
    if(r.fotosBlobs && r.fotosBlobs.length){
      for(let i=0;i<r.fotosBlobs.length;i++){
        const path = `${auditoria.id}/${q.id}_${i}_${Date.now()}.jpg`;
        const url = await uploadPhoto(r.fotosBlobs[i], path);
        if(url) fotoUrls.push(url);
      }
    }
    const {data: resp, error: e2} = await sb.from('respuestas').insert({
      auditoria_id: auditoria.id, pregunta_id:q.id, categoria:q.categoria, texto:q.texto,
      valor:r.valor, hallazgo:r.hallazgo, comentario:r.comentario, fotos:fotoUrls
    }).select().single();
    if(e2){ console.error(e2); continue; }
    if(r.valor==='No Cumple'){
      const compromiso = new Date(); compromiso.setDate(compromiso.getDate()+7);
      await sb.from('acciones').insert({
        auditoria_id:auditoria.id, respuesta_id:resp.id, planta:na.planta, area:na.area,
        descripcion_hallazgo:r.hallazgo, responsable:na.area,
        fecha_compromiso: compromiso.toISOString().slice(0,10), estado:'Abierta'
      });
    }
  }
  state.nuevaAuditoria = null;
  alert('Auditoría guardada en el repositorio central.');
  go('auditorias');
}

        <option value="Abierta" ${fEstado==='Abierta'?'selected':''}>Abierta</option>
        <option value="En Proceso" ${fEstado==='En Proceso'?'selected':''}>En Proceso</option>
        <option value="Vencida" ${fEstado==='Vencida'?'selected':''}>Vencida</option>
        <option value="Completada" ${fEstado==='Completada'?'selected':''}>Completada</option>
      </select>
      <button class="btn ghost" onclick="exportAccionesCSV()">Exportar CSV</button>
    </div>
    <div class="card">
      ${filtered.length===0? '<div class="empty">No hay planes de acción con este filtro.</div>' :
      filtered.map(a=>{
        const isClosing = closingAccionId===a.id, isDone = a.estado==='Completada';
        return `<div class="list-item" style="align-items:flex-start;flex-direction:column">
          <div style="display:flex;justify-content:space-between;width:100%;gap:10px">
            <div style="flex:1"><b>${a.planta} · ${a.area}</b> <span class="badge ${a.estadoCalc.toLowerCase().replace(' ','')}">${a.estadoCalc}</span><br>
              <span style="font-size:13px">${a.descripcion_hallazgo}</span><br>
              <span style="font-size:12px;color:var(--text-dim)">Responsable: ${a.responsable} · Compromiso: ${fmtDate(a.fecha_compromiso)}</span>
              ${isDone? `<br><span style="font-size:12px;color:var(--green)">Cerrada el ${fmtDate(a.fecha_cierre)}</span>`:''}</div>
            <div style="display:flex;flex-direction:column;gap:6px">
              ${!isDone? `<select onchange="updateAccionEstado('${a.id}',this.value)" style="width:auto">
                <option ${a.estado==='Abierta'?'selected':''}>Abierta</option><option ${a.estado==='En Proceso'?'selected':''}>En Proceso</option>
              </select><button class="btn green" style="padding:6px 10px;font-size:12px" onclick="openCierre('${a.id}')">Cerrar con evidencia</button>` : ''}
            </div></div>
          ${isDone && a.foto_cierre? `<div class="photos"><div class="photo"><img src="${a.foto_cierre}"></div></div>${a.comentario_cierre? `<p style="font-size:12px;color:var(--text-dim)">${a.comentario_cierre}</p>`:''}`:''}
          ${isClosing? `<div style="width:100%;border-top:1px solid var(--border);margin-top:10px;padding-top:10px">
            <label>Comentario de cierre</label><textarea id="cierreComentario"></textarea>
            <label style="margin-top:8px">Fotografía de evidencia (obligatoria)</label>
            <div class="photos">${closingPreview? `<div class="photo"><img src="${closingPreview}"></div>` :
              `<label class="addphoto">＋<input type="file" accept="image/*" capture="environment" style="display:none" onchange="captureCierrePhoto(this)"></label>`}</div>
            <div class="row" style="margin-top:10px">
              <button class="btn ghost" style="flex:1" onclick="cancelCierre()">Cancelar</button>
              <button class="btn green" style="flex:1" onclick="confirmCierre('${a.id}')">Confirmar cierre</button>
            </div></div>` : ''}
        </div>`;
      }).join('')}
    </div>`;
}
function openCierre(id){ closingAccionId=id; closingBlob=null; closingPreview=null; renderAcciones(); }
function cancelCierre(){ closingAccionId=null; closingBlob=null; closingPreview=null; renderAcciones(); }
async function captureCierrePhoto(input){
  const file = input.files[0]; if(!file) return;
  closingBlob = await compressImage(file); closingPreview = URL.createObjectURL(closingBlob);
  renderAcciones();
}
async function confirmCierre(id){
  if(!closingBlob){ alert('Adjunta una fotografía de evidencia.'); return; }
  const comentario = document.getElementById('cierreComentario').value.trim();
  const path = `cierres/${id}_${Date.now()}.jpg`;
  const url = await uploadPhoto(closingBlob, path);
  await sb.from('acciones').update({estado:'Completada', fecha_cierre: todayISO(), foto_cierre:url, comentario_cierre:comentario}).eq('id', id);
  closingAccionId=null; closingBlob=null; closingPreview=null;
  renderAcciones();
}
async function updateAccionEstado(id, estado){ await sb.from('acciones').update({estado}).eq('id', id); renderAcciones(); }
async function exportAccionesCSV(){
  const {data:list} = await sb.from('acciones').select('*');
  let rows = [['Planta','Area','Hallazgo','Responsable','FechaCompromiso','Estado','FechaCierre']];
  (list||[]).forEach(a=>rows.push([a.planta,a.area,a.descripcion_hallazgo,a.responsable,a.fecha_compromiso,estadoAccion(a),a.fecha_cierre||'']));
  const csv = rows.map(r=>r.map(csvEscape).join(',')).join('\n');
  download(`planes_accion_5s_${todayISO()}.csv`, '\uFEFF'+csv, 'text/csv;charset=utf-8');
}

/* ======================= CONFIGURACIÓN ======================= */
async function renderConfig(){
  document.getElementById('pageTitle').textContent = 'Configuración';
  if(currentPerfil?.rol !== 'Admin'){
    document.getElementById('content').innerHTML = `<div class="banner warn">Solo un usuario con rol Admin puede editar áreas y preguntas. Tu rol actual es "${currentPerfil?.rol}". Pide a un Admin que te asigne el rol desde la tabla "usuarios" en Supabase, o edítalo tú mismo ahí si eres el único usuario.</div>`;
    return;
  }
  const areas = await getAreas();
  const preguntas = await getPreguntas();
  const cats = ['Seiri','Seiton','Seiso','Seiketsu','Shitsuke'];
  document.getElementById('content').innerHTML = `
    <div class="card"><h2>Áreas por planta</h2>
      ${['FHACASA','ALIANSA'].map(p=>`<div style="margin-bottom:14px"><b>${p}</b>
        ${areas.filter(a=>a.planta===p).map(a=>`<div class="list-item"><span>${a.nombre}</span><button class="btn red" style="padding:4px 10px;font-size:12px" onclick="removeArea('${a.id}')">Eliminar</button></div>`).join('')}
        <div class="row" style="margin-top:6px"><input type="text" id="newArea_${p}" placeholder="Nueva área..."><button class="btn teal" onclick="addArea('${p}')">Agregar</button></div>
      </div>`).join('')}
    </div>
    <div class="card"><h2>Preguntas por categoría 5S</h2>
      ${cats.map(cat=>`<div style="margin-bottom:14px"><span class="catpill">${cat}</span>
        ${preguntas.filter(q=>q.categoria===cat).map(q=>`<div class="list-item"><span style="font-size:13px">${q.texto}</span><button class="btn red" style="padding:4px 10px;font-size:12px" onclick="removePregunta('${q.id}')">Eliminar</button></div>`).join('')}
        <div class="row" style="margin-top:6px"><input type="text" id="newPreg_${cat}" placeholder="Nueva pregunta..."><button class="btn teal" onclick="addPregunta('${cat}')">Agregar</button></div>
      </div>`).join('')}
    </div>`;
}
async function addArea(p){ const v=document.getElementById(`newArea_${p}`).value.trim(); if(!v) return; await sb.from('areas').insert({planta:p,nombre:v}); renderConfig(); }
async function removeArea(id){ await sb.from('areas').delete().eq('id',id); renderConfig(); }
async function addPregunta(cat){ const v=document.getElementById(`newPreg_${cat}`).value.trim(); if(!v) return; await sb.from('preguntas').insert({categoria:cat,texto:v}); renderConfig(); }
async function removePregunta(id){ await sb.from('preguntas').update({activa:false}).eq('id',id); renderConfig(); }
</script>
</body>
